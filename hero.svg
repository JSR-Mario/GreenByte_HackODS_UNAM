  <!-- Anillos orbitales -->
  <circle cx="140" cy="180" r="113" fill="none" stroke="#132d48" stroke-width="0.5"/>
  <circle cx="140" cy="180" r="121" fill="none" stroke="#0d1f30" stroke-width="0.5"/>

  <!-- ── Texto del hero ── -->
  <!-- Eyebrow -->
  <text x="295" y="85" font-family="'Courier New', Consolas, monospace" font-size="11" fill="#3dd68c" letter-spacing="2.5" font-weight="400">HACKODS · UNAM 2026</text>

  <!-- Título GreenByte -->
  <text x="292" y="148" font-family="'Courier New', Consolas, monospace" font-size="52" font-weight="500" fill="#daeeff" letter-spacing="-1">Green</text>
  <text x="453" y="148" font-family="'Courier New', Consolas, monospace" font-size="52" font-weight="500" fill="#3dd68c" letter-spacing="-1">Byte</text>

  <!-- Subtítulo -->
  <text x="293" y="178" font-family="system-ui, sans-serif" font-size="14" fill="#5e8fb0">Un Diagnóstico Forense del</text>
  <text x="293" y="197" font-family="system-ui, sans-serif" font-size="14" fill="#5e8fb0">Ecosistema Mexicano 2019–2024</text>

  <!-- Pill ODS 13 (Interactiva) -->
  <a href="https://www.un.org/sustainabledevelopment/es/climate-change-2/" target="_blank" style="cursor: pointer;">
    <rect x="293" y="215" width="200" height="26" rx="13" fill="#071f14" stroke="#175236" stroke-width="0.5" />
    <text x="393" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#3dd68c" style="pointer-events: none;">ODS 13 · Acción por el clima</text>
  </a>

  <!-- Footer -->
  <text x="293" y="268" font-family="system-ui, sans-serif" font-size="12" fill="#233a50">Equipo GreenByte · Datos abiertos MX · Google Earth Engine</text>
</svg>
